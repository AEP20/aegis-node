# roles/amneziawg/defaults/main.yml
# Active paths and interface values come from group_vars/all.yml.

amneziawg_apt_ppa: "ppa:amnezia/ppa"
amneziawg_package_name: "amneziawg"
amneziawg_config_dir: "{{ vpn_config_path | dirname }}"
amneziawg_inactive_wireguard_service: "wg-quick@wg0"
amneziawg_inactive_wireguard_config: "/etc/wireguard/wg0.conf"
amneziawg_inactive_wireguard_backup: "{{ amneziawg_inactive_wireguard_config }}{{ vpn_inactive_config_suffix }}"
