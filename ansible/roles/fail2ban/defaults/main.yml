# roles/fail2ban/defaults/main.yml

# --- İlk ihlal ---
# findtime içinde maxretry kadar başarısız girişim → bantime kadar ban
fail2ban_bantime: 3600      # 1 saat (saniye)
fail2ban_findtime: 600      # 10 dakikalık pencere
fail2ban_maxretry: 5        # 5 başarısız deneme

# --- Tekrarlayan saldırganlar (recidive) ---
# Son findtime_recidive içinde maxretry_recidive kez ban yediyse → bantime_recidive
fail2ban_recidive_bantime: 604800    # 1 hafta
fail2ban_recidive_findtime: 86400    # 24 saatlik pencere
fail2ban_recidive_maxretry: 3        # 24 saat içinde 3. ban → haftalık ban

# --- Asla ban'lanmaması gereken adresler ---
# VPN subnet her zaman dahil edilmeli; ek IP'ler buraya eklenebilir
fail2ban_ignoreip:
  - "10.66.66.0/24"
